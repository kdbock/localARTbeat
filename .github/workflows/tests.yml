name: Flutter Tests

env:
  FLUTTER_VERSION: "3.38.7"

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module:
          [
            artbeat_core,
            artbeat_auth,
            artbeat_profile,
            artbeat_artwork,
            artbeat_artist,
            artbeat_art_walk,
            artbeat_community,
            artbeat_capture,
            artbeat_events,
            artbeat_settings,
            artbeat_messaging,
            artbeat_ads,
            artbeat_admin,
            artbeat_sponsorships,
          ]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "${{ env.FLUTTER_VERSION }}"
          channel: "stable"
          cache: true
          cache-key: "flutter-:os:-:channel:-:version:-:arch:-:hash:"
          cache-path: "${{ runner.tool_cache }}/flutter/:channel:-:version:-:arch:"

      - name: Verify Dart SDK version
        run: dart --version

      - name: Install dependencies
        run: flutter pub get
        working-directory: packages/${{ matrix.module }}

      - name: Check formatting
        run: dart format --set-exit-if-changed .
        working-directory: packages/${{ matrix.module }}
        continue-on-error: true

      - name: Generate mocks
        run: flutter pub run build_runner build --delete-conflicting-outputs
        working-directory: packages/${{ matrix.module }}
        continue-on-error: true

      - name: Run tests
        run: |
          if [ -d "test" ] && [ "$(find test -name "*_test.dart" | wc -l)" -gt 0 ]; then
            flutter test
          else
            echo "No tests found for ${{ matrix.module }} - skipping"
            exit 0
          fi
        working-directory: packages/${{ matrix.module }}

  integration_test:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'pull_request' && github.event.pull_request.base.ref == 'main'

    steps:
      - uses: actions/checkout@v4

      - name: Create CI .env asset
        run: |
          cat > .env <<EOF
          # CI placeholder asset for flutter test/build bundle resolution.
          # Release validation uses .env.ci.release plus explicit dart-defines.
          EOF

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "${{ env.FLUTTER_VERSION }}"
          channel: "stable"
          cache: true
          cache-key: "flutter-:os:-:channel:-:version:-:arch:-:hash:"
          cache-path: "${{ runner.tool_cache }}/flutter/:channel:-:version:-:arch:"

      - name: Verify Dart SDK version
        run: dart --version

      - name: Install dependencies
        run: flutter pub get

      - name: Check formatting
        run: dart format --set-exit-if-changed .

      - name: Detect integration tests
        id: detect_integration_tests
        run: |
          if [ -d "integration_test" ] && [ -n "$(find integration_test -name '*_test.dart' -type f)" ]; then
            echo "has_tests=true" >> "$GITHUB_OUTPUT"
            echo "test_path=integration_test" >> "$GITHUB_OUTPUT"
          elif [ -d "test/integration" ] && [ -n "$(find test/integration -name '*_test.dart' -type f)" ]; then
            echo "has_tests=true" >> "$GITHUB_OUTPUT"
            echo "test_path=test/integration" >> "$GITHUB_OUTPUT"
          else
            echo "has_tests=false" >> "$GITHUB_OUTPUT"
          fi

      - name: No integration tests found
        if: steps.detect_integration_tests.outputs.has_tests != 'true'
        run: echo "No integration tests found in integration_test/ or test/integration/. Skipping."

      - name: Enable KVM
        if: steps.detect_integration_tests.outputs.has_tests == 'true'
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Start Emulator and Run Integration Tests
        if: steps.detect_integration_tests.outputs.has_tests == 'true'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 29
          arch: x86_64
          target: google_apis
          emulator-options: -no-snapshot -no-window -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: flutter test ${{ steps.detect_integration_tests.outputs.test_path }} -d emulator-5554
